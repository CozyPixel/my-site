<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Forest AI 🌲✨</title>
    <style>
        /* Весь стиль оставляем как ты просил: густой лес, небо, центрирование */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: linear-gradient(to bottom, rgba(5, 10, 20, 0.7), rgba(5, 15, 10, 0.8)), 
                              url('https://images.unsplash.com/photo-1596328323671-5589e4c845b1?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center;
            color: #e0e0e0; font-family: 'Segoe UI', sans-serif;
        }

        .app-container { display: flex; flex-direction: column; align-items: center; gap: 25px; width: 100%; max-width: 650px; padding: 20px; }

        .header-card {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 15px 40px; border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.6rem; margin: 0;
            background: linear-gradient(90deg, #2ecc71, #3498db); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .chat-box {
            width: 100%; background: rgba(10, 15, 20, 0.6);
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px; display: flex; flex-direction: column;
            height: 65vh; max-height: 720px; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        #messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }

        .msg { max-width: 75%; padding: 16px 20px; border-radius: 25px; font-size: 1rem; line-height: 1.6; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border-bottom-right-radius: 8px; }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.05); color: #f5f5f5; border: 1px solid rgba(255, 255, 255, 0.07); border-bottom-left-radius: 8px; }

        .input-area { padding: 20px 25px; background: rgba(0, 0, 0, 0.4); display: flex; gap: 15px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); padding: 16px 24px; border-radius: 35px; color: white; outline: none; }
        button { background: linear-gradient(135deg, #2ecc71, #3498db); border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        button svg { fill: white; width: 24px; height: 24px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-card"><h1>Forest Oracle ✨</h1></div>
        <div class="chat-box">
            <div id="messages"><div class="msg bot">Привет! Я — лесной оракул, подключенный через OpenRouter. Спрашивай что угодно! 🌲🌕</div></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Твое послание..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
            </div>
        </div>
    </div>

    <script>
        // --- ВСТАВЬ КЛЮЧ ОТ OPENROUTER НИЖЕ ---
        const OPENROUTER_API_KEY = "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"; 
        // --------------------------------------

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerText = text;
            const container = document.getElementById('messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = "";
            const botMsgDiv = addMessage("Слышу шепот леса...", 'bot');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-flash-1.5", // Можно сменить на "meta-llama/llama-3.1-8b-instruct"
                        "messages": [{ "role": "user", "content": text }]
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0].message.content) {
                    botMsgDiv.innerText = data.choices[0].message.content;
                } else {
                    botMsgDiv.innerText = "Ошибка: OpenRouter не ответил. Проверь баланс или ключ.";
                }
            } catch (error) {
                botMsgDiv.innerText = "Ошибка связи с лесом.";
            }
        }
    </script>
</body>
</html>
