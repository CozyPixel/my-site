<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Mist Oracle 🌲🌫️</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                              url('image_113779.jpg'); 
            background-size: cover; background-position: center;
            color: #f0f0f0; font-family: 'Segoe UI', sans-serif;
        }

        .app-container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 95%; max-width: 650px; }

        .header-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 40px; 
            border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.4rem; margin: 0;
            background: linear-gradient(90deg, #dcdde1, #7f8c8d); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 4px; font-weight: 300;
        }

        .chat-box {
            width: 100%; background: rgba(15, 20, 25, 0.8);
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; display: flex; flex-direction: column;
            height: 65vh; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; animation: fadeIn 0.4s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: #2f3640; color: #fff; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; background: rgba(0, 0, 0, 0.4); display: flex; gap: 12px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px 22px; border-radius: 30px; color: white; outline: none; }
        button { background: #dcdde1; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        button svg { fill: #2f3640; width: 22px; height: 22px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-card"><h1>MIST ORACLE</h1></div>
        <div class="chat-box">
            <div id="messages">
                <div class="msg bot">Привет, Богдан. Оракул готов слушать. Если туман долго не рассеивается — просто подожди, я просыпаюсь.</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Напиши что-нибудь..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ВСТАВЬ СЮДА СВОЙ ТОКЕН hf_...
        const HF_TOKEN = "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";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = "";
            const botMsgDiv = addMessage("Туман сгущается...", 'bot');

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-72B-Instruct",
                    {
                        headers: { 
                            "Authorization": `Bearer ${HF_TOKEN}`,
                            "Content-Type": "application/json" 
                        },
                        method: "POST",
                        body: JSON.stringify({ 
                            inputs: text,
                            parameters: { max_new_tokens: 1000, temperature: 0.7 },
                            options: { wait_for_model: true } 
                        }),
                    }
                );

                const result = await response.json();
                
                let answer = "";
                if (Array.isArray(result) && result[0].generated_text) {
                    answer = result[0].generated_text;
                } else if (result.generated_text) {
                    answer = result.generated_text;
                } else if (result.error) {
                    answer = "Ошибка оракула: " + result.error;
                } else {
                    answer = "Оракул задумался и промолчал...";
                }

                botMsgDiv.innerText = answer;
            } catch (e) {
                botMsgDiv.innerText = "Ошибка сети. Попробуй VPN или отключи AdBlock.";
                console.error("DEBUG:", e);
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            const msgs = document.getElementById('messages');
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
