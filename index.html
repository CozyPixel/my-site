<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Forest AI 🌲✨</title>
    <style>
        /* Основной стиль и фон: густой лес и красивое небо */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Центрирование по горизонтали */
            align-items: center;    /* Центрирование по вертикали */
            height: 100vh;          /* Вся высота экрана */
            width: 100vw;           /* Вся ширина экрана */
            overflow: hidden;       /* Убираем прокрутку самого сайта */
            
            /* Фон: изображение густого леса со звездным небом.
               Используем высококачественное изображение с Unsplash. */
            background-image: linear-gradient(to bottom, rgba(5, 10, 20, 0.7), rgba(5, 15, 10, 0.8)), 
                              url('https://images.unsplash.com/photo-1596328323671-5589e4c845b1?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Контейнер приложения */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 650px; /* Немного шире для лучшего восприятия */
            padding: 20px;
        }

        /* Карточка заголовка */
        .header-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 40px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.6rem;
            margin: 0;
            /* Градиент: от лесного зеленого к небесному голубому */
            background: linear-gradient(90deg, #2ecc71, #3498db); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        /* Окно чата */
        .chat-box {
            width: 100%;
            background: rgba(10, 15, 20, 0.6); /* Прозрачный темный фон для контраста */
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            
            /* Высота адаптирована под 1080p, чтобы не было скролла сайта */
            height: 65vh; /* 65% от высоты экрана */
            max-height: 720px; 
            
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .chat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.9);
        }

        /* Зона сообщений */
        #messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto; /* Скролл только внутри чата */
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* Кастомизация скроллбара чата */
        #messages::-webkit-scrollbar { width: 7px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(52, 152, 219, 0.2); border-radius: 10px; }
        #messages::-webkit-scrollbar-track { background: transparent; }

        /* Стили сообщений */
        .msg {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 25px;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.4s ease-out;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Сообщение пользователя (справа) */
        .user {
            align-self: flex-end;
            /* Небесный голубой градиент */
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white;
            border-bottom-right-radius: 8px;
        }

        /* Сообщение бота (слева) */
        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            color: #f5f5f5;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-bottom-left-radius: 8px;
        }

        /* Поле ввода */
        .input-area {
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 24px;
            border-radius: 35px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #3498db;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.15);
        }

        button {
            background: linear-gradient(135deg, #2ecc71, #3498db); /* Лес + Небо */
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        button svg {
            fill: white;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-card">
            <h1>Gemini Forest ✨🌲</h1>
        </div>

        <div class="chat-box">
            <div id="messages">
                <div class="msg bot">Привет! Я Gemini AI, твой проводник в этом цифровом лесу. Спрашивай о чем угодно, я готов! 🌌🌲</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Твое послание..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- ВСТАВЬ СВОЙ КЛЮЧ ОТ GOOGLE GEMINI НИЖЕ ---
        // Получить ключ: https://aistudio.google.com/app/apikey
        const API_KEY = "AIzaSyBOWDEObzAYxL7Z4kPh_ncJfNhwWx6Pbos"; 
        // ---------------------------------------------

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerText = text;
            const container = document.getElementById('messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();

            if (!text) return;
            
            if (API_KEY.includes("ТВОЙ_КЛЮЧ") || API_KEY.length < 10) {
                alert("Пожалуйста, вставь корректный API-ключ Gemini в код!");
                return;
            }

            addMessage(text, 'user');
            input.value = "";

            const botMsgDiv = addMessage("Слияние с космосом...", 'bot');

            try {
                // Используем Gemini 1.5 Flash для быстрого ответа
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    botMsgDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    botMsgDiv.innerText = "Хм, звезды молчат. Проверь консоль на ошибки.";
                    console.log(data);
                }

            } catch (error) {
                console.error("Error:", error);
                botMsgDiv.innerText = "Не удалось связаться с космическим разумом. Возможно, нужен VPN?";
            }
        }
    </script>
</body>
</html>
