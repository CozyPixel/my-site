<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebras Forest AI 🌲</title>
    <style>
        /* Основной стиль и фон */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Центрирование по горизонтали */
            align-items: center;    /* Центрирование по вертикали */
            height: 100vh;          /* Вся высота экрана */
            width: 100vw;           /* Вся ширина экрана */
            overflow: hidden;       /* Убираем прокрутку самого сайта */
            
            /* Фон из еловых деревьев (замени URL на свою картинку, если хочешь) */
            background-image: linear-gradient(to bottom, rgba(10, 10, 20, 0.8), rgba(5, 5, 8, 0.9)), 
                              url('https://images.unsplash.com/photo-1520262454473-a1a82276a574?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер приложения (чтобы всё было в куче) */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 600px; /* Немного шире для удобства */
        }

        /* Карточка заголовка */
        .header-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 35px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            background: linear-gradient(90deg, #2ecc71, #27ae60); /* Зеленый градиент под лес */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Окно чата */
        .chat-box {
            width: 100%;
            background: rgba(15, 20, 25, 0.7); /* Более прозрачный для фона */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            
            /* Фиксированная высота для 1080p экрана, чтобы не было скролла */
            height: 70vh; /* 70% от высоты экрана */
            max-height: 750px; /* Ограничение сверху */
            
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            transition: 0.3s ease;
        }

        /* Зона сообщений */
        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto; /* Скролл только внутри чата */
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Кастомизация скроллбара чата */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(46, 204, 113, 0.3); border-radius: 10px; }
        #messages::-webkit-scrollbar-track { background: transparent; }

        /* Стили сообщений */
        .msg {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            position: relative;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Сообщение пользователя (справа) */
        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #2ecc71, #27ae60); /* Лесной зеленый */
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2);
        }

        /* Сообщение бота (слева) */
        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 5px;
        }

        /* Поле ввода */
        .input-area {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 22px;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus {
            border-color: #2ecc71;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.1);
        }

        button {
            background: #2ecc71;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; /* Чтобы кнопка не сжималась */
        }

        button:hover {
            transform: scale(1.1) rotate(5deg);
            background: #27ae60;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        button svg {
            fill: white;
            width: 22px;
            height: 22px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-card">
            <h1>FOREST AI 🌲</h1>
        </div>

        <div class="chat-box">
            <div id="messages">
                <div class="msg bot">Привет! Я лесной ИИ, работающий на суперскорости Cerebras. Спрашивай, я отвечу мгновенно! ⚡</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Твое сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- ВСТАВЬ СВОЙ КЛЮЧ ОТ CEREBRAS НИЖЕ ---
        const CEREBRAS_API_KEY = "csk-66y54wk6e9prx2n8vh6pnw33x9cevy9txt232cyh633x2h6e"; 
        // ----------------------------------------

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerText = text;
            const container = document.getElementById('messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();

            if (!text) return;
            if (CEREBRAS_API_KEY.includes("ТВОЙ_КЛЮЧ")) {
                alert("Пожалуйста, вставь API-ключ Cerebras в код!");
                return;
            }

            addMessage(text, 'user');
            input.value = "";

            const botMsgDiv = addMessage("Обработка...", 'bot');

            try {
                const response = await fetch("https://api.cerebras.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${CEREBRAS_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3.1-8b", 
                        messages: [{ role: "user", content: text }],
                        stream: false
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0].message.content) {
                    botMsgDiv.innerText = data.choices[0].message.content;
                } else {
                    botMsgDiv.innerText = "Ошибка: API вернуло пустой ответ. Проверь ключ.";
                }

            } catch (error) {
                console.error("Error:", error);
                botMsgDiv.innerText = "Ошибка соединения. Возможно, нужен VPN для API.";
            }
        }
    </script>
</body>
</html>
