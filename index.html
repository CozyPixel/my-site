<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebras Turbo AI ⚡</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0a0a12, #050508);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .header-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 40px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            margin: 0;
            background: linear-gradient(90deg, #ff3e3e, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .chat-box {
            width: 100%;
            max-width: 500px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            height: 600px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Кастомизация скроллбара */
        #messages::-webkit-scrollbar { width: 5px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: #ff3e3e;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            color: #efefef;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }

        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: #ff3e3e;
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            background: #ff3e3e;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
        }

        button svg {
            fill: white;
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="header-card">
        <h1>Cerebras AI ⚡</h1>
    </div>

    <div class="chat-box">
        <div id="messages">
            <div class="msg bot">Привет! Я самая быстрая нейросеть в мире. Спрашивай что угодно, я отвечу мгновенно! 🚀</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твое сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // --- ВСТАВЬ СВОЙ КЛЮЧ ОТ CEREBRAS НИЖЕ ---
        const CEREBRAS_API_KEY = "csk-66y54wk6e9prx2n8vh6pnw33x9cevy9txt232cyh633x2h6e"; 
        // ----------------------------------------

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerText = text;
            const container = document.getElementById('messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();

            if (!text) return;
            if (CEREBRAS_API_KEY.includes("ТВОЙ_КЛЮЧ")) {
                alert("Пожалуйста, вставь API-ключ Cerebras в код!");
                return;
            }

            addMessage(text, 'user');
            input.value = "";

            const botMsgDiv = addMessage("Загрузка...", 'bot');

            try {
                const response = await fetch("https://api.cerebras.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${CEREBRAS_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3.1-8b", 
                        messages: [{ role: "user", content: text }],
                        stream: false
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0].message.content) {
                    botMsgDiv.innerText = data.choices[0].message.content;
                } else {
                    botMsgDiv.innerText = "Ошибка: API вернуло пустой ответ. Проверь ключ.";
                }

            } catch (error) {
                console.error("Error:", error);
                botMsgDiv.innerText = "Ошибка соединения. Проверь интернет или API ключ.";
            }
        }
    </script>
</body>
</html>
